name: Bug report
description: Something is broken or behaving unexpectedly.
title: "bug: <one-line summary>"
labels: ["bug", "triage"]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please fill in as much
        of the form as you can — the more we know, the faster we can fix it.

        Before submitting:
        - Search [existing issues](https://github.com/GrayCodeAI/hawk-sdk-go/issues) to avoid duplicates.
        - If this is a security issue, please **do not** file a public issue. See `SECURITY.md`.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear, concise description of the bug.
      placeholder: When I call hawksdk.Client.<method>, I expected X but got Y.
    validations:
      required: true

  - type: dropdown
    id: surface
    attributes:
      label: Surface
      description: Which SDK surface is affected?
      options:
        - "Client (Health / Chat / Sessions / Stats / DeleteSession)"
        - "ChatStream / SSE"
        - "Retry / backoff"
        - "Errors (typed APIError, categories)"
        - "Agent / Tool / Workflow orchestration"
        - "Build / module"
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal Go snippet that reliably reproduces the problem.
      render: go
      placeholder: |
        c := hawksdk.New()
        resp, err := c.Chat(context.Background(), hawksdk.ChatRequest{Message: "..."})
        // ^ wrong shape / panic / hang / etc.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen instead?
    validations:
      required: true

  - type: input
    id: sdk-version
    attributes:
      label: hawk-sdk-go version
      description: Output of `hawksdk.Version` or the git SHA you built from.
      placeholder: "0.2.0"
    validations:
      required: true

  - type: input
    id: daemon-version
    attributes:
      label: hawk daemon version
      description: Output of `hawk version` (the daemon you're hitting).
      placeholder: "0.2.0"
    validations:
      required: true

  - type: input
    id: go-version
    attributes:
      label: Go version
      description: Output of `go version`.
      placeholder: "go version go1.26.1 darwin/arm64"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      description: e.g. macOS 14.5 (arm64), Ubuntu 24.04 (amd64), Windows 11 (amd64).
      placeholder: "macOS 14.5 (arm64)"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / output
      description: |
        Paste any relevant output, including the full error wrapping chain.
        **Redact API tokens, session IDs, and any private data first.**
      render: shell

  - type: checkboxes
    id: confirm
    attributes:
      label: Confirmation
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true
        - label: I redacted any secrets, tokens, or private data from logs.
          required: true
